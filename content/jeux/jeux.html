<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="description" content="Tesla Portal - Section Jeux">
<title>Jeux</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: "Helvetica Neue", sans-serif;
    }

    /* Grille XXL */
    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        padding: 0;
    }

    /* Icônes */
    .grid a img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        border-radius: 4px;
        padding: 0;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    /* Effet hover premium */
    .grid a img:hover {
        transform: scale(1.10);
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
    }

    /* Effet tactile Tesla */
    .grid a img:active {
        transform: scale(0.95);
        opacity: 0.85;
    }

    /* Responsive Tesla-friendly */
    @media (max-width: 900px) {
        .grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }
</style>
</head>

<body>

<div class="grid">

    <a href="https://www.xbox.com/fr-FR/play" target="_parent"><img src="./img/xbox-cloud.png"></a>
    <a href="https://www.retrogames.cc/" target="_parent"><img src="./img/retrogames.png"></a>

    <a href="https://web.parsec.app/" target="_parent"><img src="./img/parsec.png"></a>
    <a href="https://play.geforcenow.com/mall/" target="_parent"><img src="./img/geforce-now.png"></a>
    <a href="https://afterplay.io/" target="_parent"><img src="./img/afterplay.png"></a>


</div>

</body>
</html>
