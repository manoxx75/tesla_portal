<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="description" content="Tesla Portal - Section Navigation & Recharges">
<title>Navigation & Recharges</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: "Helvetica Neue", sans-serif;
    }

    /* Grille XXL */
    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        padding: 0;
    }

    /* Icônes */
    .grid a img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        border-radius: 4px;
        padding: 0;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    /* Effet hover premium */
    .grid a img:hover {
        transform: scale(1.10);
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
    }

    /* Effet tactile Tesla */
    .grid a img:active {
        transform: scale(0.95);
        opacity: 0.85;
    }

    /* Responsive Tesla-friendly */
    @media (max-width: 900px) {
        .grid {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }
</style>
</head>

<body>

<div class="grid">

    <a href="https://www.waze.com/fr/live-map/" target="_parent"><img src="./img/waze.png"></a>
    <a href="https://fr.chargemap.com/map" target="_parent"><img src="./img/ChargeMap_T.png"></a>
    <a href="https://electroverse.com/fr-FR/map" target="_parent"><img src="./img/electroverse.png"></a>
    <a href="https://abetterrouteplanner.com/" target="_parent"><img src="./img/abrp_T.png"></a>
    <a href="https://www.google.fr/maps/" target="_parent"><img src="./img/google-maps.png"></a>

    <a href="https://www.tesla.com/fr_FR/findus" target="_parent"><img src="./img/superchageurs_T.png"></a>
    <a href="https://www.infotrafic.com/" target="_parent"><img src="./img/info-traffic.png"></a>
    <a href="https://fr.chargeprice.app/" target="_parent"><img src="./img/chargeprice_T.png"></a>
    <a href="https://plugshare.com/fr" target="_parent"><img src="./img/plugshare_T.png"></a>
    <a href="https://apps.total-ev-charge.com/charge-points" target="_parent"><img src="./img/total_ev_charge_T.png"></a>

    <a href="https://www.teslafi.com/" target="_parent"><img src="./img/teslafi_T.png"></a>
    <a href="https://www.windy.com/" target="_parent"><img src="./img/windy_T.png"></a>


</div>

</body>
</html>
