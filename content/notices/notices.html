<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: "Helvetica Neue", sans-serif;
    }

    /* Grille XXL */
    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        padding: 0;
    }

    /* Icônes */
    .grid a img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        border-radius: 4px;
        padding: 0;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    /* Effet hover premium */
    .grid a img:hover {
        transform: scale(1.10);
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
    }

    /* Effet tactile Tesla */
    .grid a img:active {
        transform: scale(0.95);
        opacity: 0.85;
    }

    /* Bloc message centré */
    .message {
        grid-column: span 5;
        text-align: center;
        padding: 20px;
        font-size: 1rem;
        opacity: 0.85;
        line-height: 1.4;
    }

    /* Responsive Tesla-friendly */
    @media (max-width: 900px) {
        .grid {
            grid-template-columns: repeat(3, 1fr);
        }
        .message {
            grid-column: span 3;
        }
    }

    @media (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .message {
            grid-column: span 2;
        }
    }
</style>
</head>
