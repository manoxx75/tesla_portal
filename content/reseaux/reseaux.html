<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="description" content="Tesla Portal - Section Réseaux & Visios">
<title>Réseaux & Visios</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: "Helvetica Neue", sans-serif;
    }

    /* Grille XXL */
    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0;
        padding: 0;
    }

    /* Icônes */
    .grid a img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        border-radius: 4px;
        padding: 0;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    /* Effet hover premium */
    .grid a img:hover {
        transform: scale(1.10);
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
    }

    /* Effet tactile Tesla */
    .grid a img:active {
        transform: scale(0.95);
        opacity: 0.85;
    }

    /* Bloc message centré */
    .message {
        grid-column: span 5;
        text-align: center;
        padding: 20px;
        font-size: 1rem;
        opacity: 0.8;
        line-height: 1.4;
    }

    /* Responsive Tesla-friendly */
    @media (max-width: 900px) {
        .grid {
            grid-template-columns: repeat(3, 1fr);
        }
        .message {
            grid-column: span 3;
        }
    }

    @media (max-width: 600px) {
        .grid {
            grid-template-columns: repeat(2, 1fr);
        }
        .message {
            grid-column: span 2;
        }
    }
</style>
</head>

<body>

<div class="grid">

    <a href="https://teams.microsoft.com/" target="_parent"><img src="./img/Teams_T.png"></a>
    <a href="https://web.whatsapp.com/" target="_parent"><img src="./img/WhatsApp_T.gif"></a>
    <a href="https://www.tiktok.com/fr/" target="_parent"><img src="./img/tiktok.png"></a>
    <a href="https://www.instagram.com/" target="_parent"><img src="./img/instagram.png"></a>
    <a href="https://discord.com/" target="_parent"><img src="./img/discord.png"></a>

    <div class="message">
        Les visios ne sont pas fonctionnelles.<br>
        Peut‑être que cela fonctionnera quand la caméra intérieure sera activée.
    </div>

</div>

</body>
</html>
