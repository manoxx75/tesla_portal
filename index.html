<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="description" content="Pour les possesseurs de Tesla, un menu en plein écran avec du contenu adapté à la France !">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Portal - Le divertissement en plein écran pour Tesla</title>
<link rel="icon" type="image/png" href="/favicon.png">

<style>
    body {
        margin: 0;
        background-color: #000;
        color: #fff;
        font-family: "Helvetica Neue", sans-serif;
    }

    /* Sécurité : si frames non supportés */
    .noframes-message {
        padding: 20px;
        text-align: center;
        font-size: 1.2rem;
    }
</style>
</head>

<!-- Structure principale -->
<frameset rows="150,*,35" frameborder="0" border="0" framespacing="0">

    <!-- Barre de titre -->
    <frame 
        src="./partials/titre/titre.html?var=26112025" 
        name="topFrame" 
        scrolling="no" 
        noresize="noresize"
    >

    <!-- Contenu principal -->
    <frame 
        src="./content/accueil/accueil.html?var=26112025" 
        name="mainFrame"
    >

    <!-- Barre du bas -->
    <frame 
        src="./partials/bas/bas.html?var=26112025" 
        name="bottomFrame"
    >

    <noframes>
        <div class="noframes-message">
            Votre navigateur ne supporte pas les frames.  
            Ce portail nécessite un affichage compatible.
        </div>
    </noframes>

</frameset>

</html>
