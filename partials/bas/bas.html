<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="description" content="Tesla Portal - Pied">
<title>Footer</title>

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: "Helvetica Neue", sans-serif;
    }

    /* Conteneur principal du footer */
    .footer {
        height: 35px; /* correspond à ton frameset */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Bouton PayPal */
    .paypal-btn {
        display: inline-block;
        padding: 6px 14px;
        background-color: #0070ba;
        color: #fff;
        font-size: 11px;
        font-weight: 600;
        text-decoration: none;
        border-radius: 4px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: background 0.2s ease;
    }

    .paypal-btn:hover {
        background-color: #005c96;
    }
</style>
</head>

<body>

<div class="footer">
    <a href="https://paypal.me/EricWander" target="_blank" class="paypal-btn">
        Faire un don via PayPal
    </a>
</div>

</body>
</html>
